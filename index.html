<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nauka Słówek - Hiszpański</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Słówka</h1>
        
        <div class="mode-switch">
            <button id="btn-typing" class="mode-btn active-mode">Wpisywanie</button>
            <button id="btn-choice" class="mode-btn">Wybieranie</button>
        </div>

        <main class="card">
            <p id="slowo"></p>
            
            <div id="typing-container" class="action-container">
                <div class="input-group">
                    <input type="text" id="odp" placeholder="Wpisz tłumaczenie..." autocomplete="off">
                </div>
                <button id="check" class="primary-btn">Sprawdź</button>
            </div>

            <div id="options-container" class="action-container hidden">
                </div>
            
            <p id="czy"></p>
        </main>
    </div>
</body>
</html>
